<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            header {
                display: flex;
                width: 100%;
                height: 100px;
                background-color: white;
                align-items: center;
                position: fixed;
            }
            p.title {
                font-family: system-ui;
                font-size: 150%;
            }
            hr {
                color: white;
            }
            a:link {
                color: #0A0;
                text-decoration: underline;
            }
            a:hover {
                color: #0AA;
                text-decoration: underline;
            }
            a:visited {
                color: #A0A;
                text-decoration: underline;
            }
            a:active {
                color: #AA0;
                text-decoration: underline;
            }
            a.top:link,a.top:visited {
                color: white;
                text-decoration: none;
            }
            a.top:hover {
                color: #AAA;
                text-decoration: underline;
            }
            a.top:active {
                color: #555;
                text-decoration: underline;
            }
            body {
                text-align: center;
                font-family: system-ui;
                font-size: 100%;
                background-color: black;
                color: white;
                width: 80%;
                margin: 0 auto;
                max-width: 500px;
            }
            #title {
                font-family: system-ui;
                font-size: 150%;
            }
            #send {
                text-align: left;
                font-size: 50%;
            }
            textarea {
                font-family: system-ui;
                border: 2px solid #AAA;
                padding: 0;
                background-color: black;
                color: white;
                resize: vertical;
                width: 500px;
            }
            ::placeholder {
                color: #AAA;
            }
            textarea:hover {
                border: 2px solid #0AA;
                outline: 0;
            }
            textarea:focus {
                border: 2px solid #AA0;
                outline: 0;
            }
            input {
                font-family: system-ui;
                padding: 0;
                border: none;
                background-color: black;
                color: white;
            }
            ::placeholder {
                color: #AAA;
            }
            input[type="text"] {
                border-bottom: 2px solid #AAA;
            }
            input[type="text"]:hover {
                border-bottom: 2px solid #0AA;
            }
            input[type="text"]:focus {
                border-bottom: 2px solid #AA0;
                outline: 0;
            }
            #button {
                text-align: right;
            }
            input[type="button"] {
                color: #AAA;
                border: none;
                border-bottom: 2px solid #AAA;
            }
            input[type="button"]:hover {
                color: #0AA;
                border-bottom: 2px solid #0AA;
            }
            input[type="button"]:active {
                color: #AA0;
                border-bottom: 2px solid #AA0;
            }
            #texts {
                text-align: left;
                font-size: 50%;
            }
        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script type="module">
            import {
                initializeApp
            } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
            import {
                getDatabase,
                ref,
                set,
                onValue,
                get,
                push
            } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

            const firebaseConfig = {
                databaseURL: "https://enthread-firebase-default-rtdb.firebaseio.com",
            };
            const app = initializeApp(firebaseConfig);
            const database = getDatabase(app);
            const textsRef = ref(database, "texts");

            let threadParam = "";
            let textParam = "";
            const searchParams = new URLSearchParams(location.search);
            if (searchParams.has("t")) {
                threadParam = searchParams.get("t");
            }
            if (searchParams.has("x")) {
                textParam = searchParams.get("x");
            }

            document.title = "Enthread-Beta";
            $("body").empty();
            $("body").append(`<h1><p class="title"><a class="top" href="${location.pathname}">EnthreadBeta</a></p></h1><h2><hr><div id="send" class="text"><p class="id"><span id="length"></span>: <input type="text" id="send_author" placeholder="Your name">(${location.hostname}, time)</p><p class="message"><textarea id="send_message" placeholder="Your message"></textarea></p><p id="button"><input type="button" id="send_button" value="SEND"></p><hr></div><div id="texts"></div><div><a href="https://github.com/entitypengin/enthread">Github</a></div></h2>`);

            $("#send_button").on("click", function () {
                const newTextRef = push(textsRef)
                set(newTextRef, {
                    author: document.getElementById("send_author").value,
                    message: document.getElementById("send_message").value,
                    host: location.hostname,
                    timestamp: Date.now()
                });
            });

            function setTexts(texts) {
                $("#texts").empty();
                var i = 0;
                var author = "";
                var message = "";
                var host = "";
                var time = "";
                for (var id in texts) {
                    author = texts[id].author.replace(/</g, "&lt;").replace(/</g, "&gt;");
                    message = texts[id].message.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>").replace(/([a-zA-Z]+:\/\/)?((([a-z\d]([a-z\d-]*[a-z\d])*)\.)+[a-z]{2,}|((\d{1,3}\.){3}\d{1,3}))(\:\d+)?(\/[-a-z\d%_.~+]*)*(\?[;&a-z\d%_.~+=-]*)?(\#[-a-z\d_]*)?/ig, (str) => {
                        return `<a href="${str}">${str}</a>`;
                    }).replace(/#\d*/g, (str) => {
                        return `<a href="?x=${str.slice(1)}">${str}</a>`;
                    });
                    host = `${texts[id].host}`.replace(/([a-zA-Z]+:\/\/)?((([a-z\d]([a-z\d-]*[a-z\d])*)\.)+[a-z]{2,}|((\d{1,3}\.){3}\d{1,3}))(\:\d+)?(\/[-a-z\d%_.~+]*)*(\?[;&a-z\d%_.~+=-]*)?(\#[-a-z\d_]*)?/ig, (str) => {
                        return `<a href="https://${str}">${str}</a>`;
                    });
                    time = new Date(texts[id].timestamp).toISOString();
                    $("#texts").prepend(`<div id="x${i}" class="text"><div class="content"><p class="id">${i}: ${author} (${host}, ${time})</p><p class="message">${message}</p></div><hr></div>`);
                    i++;
                }
                $("#length").text(`${i}`);
            }

            get(textsRef).then((snapshot) => {
                if (snapshot.exists()) {
                    setTexts(snapshot.val());
                    try {
                        if (textParam != "") {
                            var animeSpeed = 500;
                            var target = $(`#x${textParam}`);
                            var position;
                            position = target.offset().top;
                            $("body,html").stop().animate({
                                scrollTop: position
                            }, animeSpeed);
                        }
                    } catch (error) {
                        console.error(error);
                    }
                }
            }).catch((error) => {
                console.error(error);
            });

            onValue(textsRef, (snapshot) => {
                setTexts(snapshot.val());
            });
        </script>
    </head>
    <body></body>
</html>
